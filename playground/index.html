<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>snowcrystal — 中谷ダイアグラム探索 / Nakaya Diagram Explorer</title>
    <style>
      :root {
        --bg: #141821;
        --panel: rgba(22, 27, 38, 0.72);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #e8ecf4;
        --muted: #9aa6bd;
        --accent: #7fb4ff;
        --marker: #ff6b6b;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ───────────────────────────────────────────────────────────────
         DESKTOP (default, ≥769px): canvas full-screen, panels at corners.
         body does not scroll. DOM order does not matter here because every
         panel is position:fixed with explicit corner anchors.
         ─────────────────────────────────────────────────────────────── */
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      /* 3D canvas fills the viewport behind the floating panels. */
      canvas#scene {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .panel {
        position: fixed;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 16px 18px;
        z-index: 10;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }

      #controls {
        top: 16px;
        left: 16px;
        width: 280px;
      }

      .panel h1 {
        margin: 0 0 2px;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0.01em;
      }

      .panel .sub {
        margin: 0 0 14px;
        font-size: 11px;
        color: var(--muted);
      }

      /* 入力モード切替（スライダー / 手動 / 成長パス）。暗黙切替（スライダー操作・
         形態選択）でもハイライトが追従する。 */
      .mode-switch {
        display: flex;
        gap: 4px;
        margin: 0 0 2px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--panel-border);
        border-radius: 9px;
        padding: 3px;
      }

      .mode-switch button {
        flex: 1;
        background: none;
        border: none;
        border-radius: 6px;
        color: var(--muted);
        font-size: 11.5px;
        font-family: inherit;
        padding: 5px 0;
        cursor: pointer;
      }

      .mode-switch button.active {
        background: rgba(127, 180, 255, 0.18);
        color: var(--text);
      }

      /* 広幅枝 2 案比較トグル(案 K K-a)— 小型の mode-switch。広幅枝表示時のみ有効 */
      .mode-switch.mini {
        margin: 0;
        flex: 0 0 auto;
        padding: 2px;
      }

      .mode-switch.mini button {
        flex: 0 0 auto;
        font-size: 10.5px;
        padding: 3px 9px;
      }

      .mode-switch button:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }

      .field {
        margin: 14px 0 0;
      }

      .field-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 6px;
      }

      .field label {
        font-size: 12px;
        color: var(--muted);
      }

      .field .value {
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        color: var(--text);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .divider {
        height: 1px;
        background: var(--panel-border);
        margin: 16px 0 0;
      }

      .select-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
      }

      .select-row label {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      select {
        flex: 1;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 12px;
        font-family: inherit;
      }

      .mode-tag {
        display: inline-block;
        margin-top: 12px;
        font-size: 10.5px;
        color: var(--muted);
        opacity: 0.85;
      }

      /* 結晶学注記トグル(案 N)。パスモード中は main.ts が disabled にする */
      .check-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 12px;
      }

      .check-row label {
        font-size: 12px;
        color: var(--muted);
      }

      .check-row input[type="checkbox"] {
        accent-color: var(--accent);
        cursor: pointer;
      }

      .check-row input[type="checkbox"]:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }

      /* 結晶学注記レイヤーのラベル(CSS2DObject の中身 — ja / en 2 行)。
         オーバーレイ div 自体は main.ts が生成し canvas 矩形へ同期する
         (pointer-events: none・z-index 5 = canvas 0 とパネル 10 の間)。 */
      .annot {
        font-size: 11px;
        line-height: 1.3;
        color: #cfe2ff;
        text-align: center;
        white-space: nowrap;
        text-shadow:
          0 1px 4px rgba(0, 0, 0, 0.9),
          0 0 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }

      .annot .annot-en {
        font-size: 9.5px;
        opacity: 0.75;
      }

      /* 一文注記の画面固定キャプション(canvas 下端中央 — オーバーレイ内に
         main.ts が生成。真上視点での c 軸ラベルとの衝突回避、目視ラウンド 1) */
      .annot-caption {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        font-size: 11px;
        line-height: 1.35;
        color: var(--muted);
        text-align: center;
        white-space: nowrap;
        text-shadow:
          0 1px 4px rgba(0, 0, 0, 0.9),
          0 0 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }

      .annot-caption .annot-en {
        font-size: 9.5px;
        opacity: 0.75;
      }

      #info {
        top: 16px;
        right: 16px;
        width: 248px;
        text-align: right;
      }

      #info .morph-ja {
        font-size: 26px;
        font-weight: 680;
        line-height: 1.15;
      }

      /* 仮 / provisional バッジ(案 K §2.2)— 薄い琥珀系・小フォント・控えめ。
         3D キャンバス上には出さず情報パネルのみ。ホバー(title)で「何が仮か」 */
      .prov-badge {
        display: inline-block;
        margin-right: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        vertical-align: 0.5em;
        color: #ffd79a;
        background: rgba(255, 184, 107, 0.12);
        border: 1px solid rgba(255, 184, 107, 0.35);
        cursor: help;
        white-space: nowrap;
      }

      .prov-badge[hidden] {
        display: none;
      }

      #info .morph-en {
        font-size: 13px;
        color: var(--muted);
        margin-top: 2px;
      }

      #info .code {
        font-size: 40px;
        font-weight: 720;
        color: var(--accent);
        letter-spacing: 0.02em;
        margin: 10px 0 2px;
        font-variant-numeric: tabular-nums;
      }

      #info .code-label {
        font-size: 10.5px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      #hierarchy {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--panel-border);
        font-size: 11px;
        line-height: 1.7;
        color: var(--muted);
        text-align: right;
      }

      #hierarchy .cur {
        color: var(--text);
        font-weight: 600;
      }

      #region-line {
        margin-top: 6px;
        font-size: 11px;
        color: var(--muted);
        text-align: right;
      }

      /* 成長パスモードのステージ①②行 + 複合行 */
      #path-info {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--panel-border);
        font-size: 11px;
        line-height: 1.7;
        color: var(--muted);
        text-align: right;
      }

      #path-info .path-stage.sel {
        color: var(--text);
        font-weight: 600;
      }

      #path-info .mark {
        font-weight: 700;
      }

      #path-composite {
        margin-top: 6px;
      }

      #diagram {
        bottom: 16px;
        left: 16px;
        padding: 14px 14px 10px;
      }

      #diagram .diagram-title {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 8px;
        letter-spacing: 0.02em;
      }

      canvas#nakaya {
        display: block;
        border-radius: 8px;
        width: 300px;
        height: 220px;
        /* 成長パスモードのポインタドラッグをタッチでも成立させる */
        touch-action: none;
      }

      #footnote {
        position: fixed;
        bottom: 14px;
        right: 18px;
        z-index: 10;
        font-size: 10.5px;
        color: var(--muted);
        opacity: 0.7;
        text-align: right;
        max-width: 300px;
        line-height: 1.5;
        background: none;
        border: none;
        box-shadow: none;
        padding: 0;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      #footnote a {
        color: var(--muted);
      }

      /* ───────────────────────────────────────────────────────────────
         MOBILE (≤768px): single scrollable column matching production.
         The DOM order below — 3D → controls(sliders) → diagram → info →
         footnote — becomes the vertical stack order here. Sliders sit
         directly above the Nakaya diagram so the marker moves in view.
         ─────────────────────────────────────────────────────────────── */
      @media (max-width: 768px) {
        html,
        body {
          height: auto;
          overflow-y: auto;
          overflow-x: hidden;
        }

        #app {
          position: static;
          display: flex;
          flex-direction: column;
          gap: 12px;
          padding: 12px;
          min-height: 100%;
        }

        /* Panels drop out of fixed positioning into normal flow. */
        .panel {
          position: static;
          width: 100%;
          inset: auto;
          text-align: left;
        }

        #controls,
        #info {
          width: 100%;
        }

        /* 3D becomes a bounded block at the top, not a full-screen layer. */
        canvas#scene {
          position: static;
          inset: auto;
          width: 100%;
          height: 52vh;
          min-height: 300px;
          border-radius: var(--radius);
          z-index: 0;
        }

        #info {
          text-align: left;
        }

        #info .code {
          font-size: 34px;
        }

        #hierarchy,
        #path-info {
          text-align: left;
        }

        canvas#nakaya {
          width: 100%;
          height: auto;
        }

        #footnote {
          position: static;
          width: 100%;
          max-width: none;
          text-align: left;
          opacity: 0.8;
          padding: 0 4px 8px;
        }
      }
    </style>
  </head>
  <body>
    <!-- DOM order = mobile stack order (matches production):
         3D(scene) → controls(sliders) → diagram(Nakaya) → info(classification) → footnote.
         On desktop every panel is position:fixed, so this order does not affect the
         four-corner layout. The sliders and the diagram are kept adjacent so that on
         mobile the red marker moves within the same viewport as the sliders. -->
    <div id="app">
      <!-- ① 3D view (主役・上部) -->
      <canvas id="scene"></canvas>

      <!-- ② inputs: temperature → vapor → direct-select -->
      <section class="panel" id="controls">
        <h1>中谷ダイアグラム探索</h1>
        <p class="sub">Nakaya Diagram Explorer · snowcrystal</p>

        <div class="mode-switch" id="mode-switch" role="group" aria-label="入力モード">
          <button type="button" data-mode="climate" class="active">スライダー</button>
          <button type="button" data-mode="manual">手動</button>
          <button type="button" data-mode="path">成長パス</button>
        </div>

        <div class="field">
          <div class="field-row">
            <label for="temp">気温 / Temperature</label>
            <span class="value" id="temp-val">−15.0 ℃</span>
          </div>
          <input type="range" id="temp" min="0" max="40" step="0.5" value="15" />
        </div>

        <div class="field">
          <div class="field-row">
            <label for="vapor">水蒸気量 / Supersaturation</label>
            <span class="value" id="vapor-val">0.250</span>
          </div>
          <input type="range" id="vapor" min="0" max="0.3" step="0.001" value="0.25" />
        </div>

        <div class="divider"></div>

        <div class="select-row">
          <label for="morphology">形態を直接選択</label>
          <select id="morphology">
            <option value="">（スライダー連動）</option>
            <option value="樹枝状">樹枝状 / Dendrite</option>
            <option value="星状">星状 / Stellar Crystal</option>
            <option value="羊歯">羊歯 / Fernlike Crystal</option>
            <option value="扇形">扇形 / Sector</option>
            <option value="広幅枝">広幅枝（仮） / Broad Branches</option>
            <option value="角板">角板 / Plate</option>
            <option value="厚角板">厚角板 / Thick Plate</option>
            <option value="骸晶角板">骸晶角板 / Skeleton Plate</option>
            <option value="角柱">角柱 / Column</option>
            <option value="長柱">長柱 / Long Solid Column</option>
            <option value="骸晶角柱">骸晶角柱 / Skeleton Column</option>
            <option value="針">針 / Needle</option>
            <option value="さや">さや / Sheath</option>
            <option value="砲弾集合">砲弾集合 / Bullet Rosette</option>
            <option value="側面">側面 / Side Planes</option>
          </select>
        </div>

        <!-- 広幅枝(P1c)の 2 案比較トグル(案 K K-a)。広幅枝表示時のみ有効・既定 = 案 1。
             9 月専門家確認 (1)「この 2 案のどちらですか」を画面で並べるための仮実装 UI -->
        <div class="check-row" id="broad-variant-row">
          <label>広幅枝 2 案 / P1c variant</label>
          <div class="mode-switch mini" id="broad-variant">
            <button type="button" data-variant="1" class="active" disabled>案 1 平行</button>
            <button type="button" data-variant="2" disabled>案 2 拡幅</button>
          </div>
        </div>

        <!-- 結晶学注記レイヤー(案 N)。既定 OFF(裁量 4)・パスモード中 disabled(裁量 2) -->
        <div class="check-row">
          <label for="annot-toggle">結晶学注記 / Annotations</label>
          <input type="checkbox" id="annot-toggle" />
        </div>

        <span class="mode-tag" id="mode-tag">入力: 気温・水蒸気量（スライダー連動）</span>
      </section>

      <!-- ③ 2D Nakaya diagram — kept directly below the sliders -->
      <section class="panel" id="diagram">
        <div class="diagram-title">気温 × 水蒸気量 / Nakaya diagram</div>
        <canvas id="nakaya" width="300" height="220"></canvas>
      </section>

      <!-- ④ live morphology / classification -->
      <section class="panel" id="info">
        <!-- 仮バッジ(案 K §2.2): 表示中 region の source 接頭辞 'provisional: ' から
             main.ts が導出(ハードコード表なし)。title 属性に「何が仮か」(suffix) -->
        <div class="morph-ja">
          <span id="prov-badge" class="prov-badge" hidden>仮 / provisional</span><span
            id="morph-ja"
            >樹枝状</span
          >
        </div>
        <div class="morph-en" id="morph-en">Dendrite</div>
        <div class="code" id="global-code">P4g</div>
        <div class="code-label">Global Classification</div>
        <div id="hierarchy"></div>
        <div id="region-line"></div>
        <!-- 成長パスモード時のみ表示: ステージ①②の形態/領域 + 複合行 -->
        <div id="path-info" style="display: none">
          <div class="path-stage" id="path-stage-1"></div>
          <div class="path-stage" id="path-stage-2"></div>
          <div id="path-composite"></div>
        </div>
      </section>

      <!-- ⑤ source -->
      <div id="footnote">
        形態の可視化（物理モデルではない）· A morphological visualization.<br />
        出典 / Source:
        <a href="https://snownotes.org/elsewhere/snow-crystal-3d-seppyo/">雪氷 88巻3号 / SEPPYO Vol.88 No.3</a>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
