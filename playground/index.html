<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>snowcrystal playground</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #eee;
        font-family: sans-serif;
        overflow: hidden;
      }
      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.8;
      }
      select,
      input {
        margin-left: 6px;
      }
      .note {
        opacity: 0.7;
        font-size: 11px;
        max-width: 260px;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div>
        morphology
        <select id="morphology">
          <option value="樹枝状">樹枝状 / Dendrite</option>
          <option value="扇形">扇形 / Sector</option>
          <option value="角板">角板 / Plate</option>
          <option value="厚角板">厚角板 / Thick Plate</option>
          <option value="骸晶角板">骸晶角板 / Skeleton Plate</option>
          <option value="角柱">角柱 / Column</option>
          <option value="骸晶角柱">骸晶角柱 / Skeleton Column</option>
          <option value="針">針 / Needle</option>
          <option value="さや">さや / Sheath</option>
        </select>
      </div>
      <div>seed <input id="seed" type="number" value="1" style="width: 64px" /></div>
      <div class="note">
        A morphological visualization (Nakaya diagram / global classification),
        not a physical growth model.
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
